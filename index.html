<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌤 Weather App</h1>

<div class="search">

<input type="text" id="city" placeholder="Enter city">

<button id="btn">Search</button>

</div>

<div class="weather">

<h2 id="cityName"></h2>

<img id="icon">

<h1 id="temp"></h1>

<h3 id="description"></h3>

<div class="details">

<div class="box">
<h2 id="humidity"></h2>
<p>Humidity</p>
</div>

<div class="box">
<h2 id="wind"></h2>
<p>Wind</p>
</div>

<div class="box">
<h2 id="feels"></h2>
<p>Feels Like</p>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
